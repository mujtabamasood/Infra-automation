---
# Baseline hardening + package management for RHEL/Ubuntu hosts (demo)
- name: Base server configuration
  hosts: all
  become: true
  vars:
    common_packages:
      - vim
      - curl
      - htop
      - chrony
  tasks:
    - name: Ensure common packages are installed
      package:
        name: "{{ common_packages }}"
        state: present

    - name: Ensure chrony (time sync) is running
      service:
        name: chronyd
        state: started
        enabled: true

    - name: Apply latest security patches
      package:
        name: "*"
        state: latest
      when: apply_updates | default(false)

    - name: Disable root SSH login (hardening)
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: restart sshd

  handlers:
    - name: restart sshd
      service:
        name: sshd
        state: restarted
